spring:
  profiles:
    active: local

  datasource:
    url: jdbc:mysql://localhost:3306/adjuster_db?useSSL=false&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

ai:
  mode: local  # local (무료) 또는 openai (유료)
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4o-mini
    max-tokens: 300
    base-url: https://api.openai.com/v1

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}

notification:
  telegram:
    enabled: false
  email:
    enabled: false

logging:
  level:
    com.adjuster: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: INFO
