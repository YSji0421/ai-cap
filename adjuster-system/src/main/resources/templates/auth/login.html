<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>로그인 - 손해사정 시스템</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="login-page">
<div class="login-container">
    <div class="login-box">
        <div class="login-header">
            <h1>⚖️ 손해사정 시스템</h1>
            <p>개인 손해사정사 업무 자동화 플랫폼</p>
        </div>

        <div th:if="${errorMsg}" class="alert alert-error" th:text="${errorMsg}"></div>
        <div th:if="${logoutMsg}" class="alert alert-success" th:text="${logoutMsg}"></div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email"
                       placeholder="adjuster@test.com" required autofocus/>
            </div>
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password"
                       placeholder="비밀번호 입력" required/>
            </div>
            <button type="submit" class="btn btn-primary btn-full">로그인</button>
        </form>

        <div class="login-hint">
            <small>테스트 계정: adjuster@test.com / adjuster123</small>
        </div>
    </div>
</div>
</body>
</html>
