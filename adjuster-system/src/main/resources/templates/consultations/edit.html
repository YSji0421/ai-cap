<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>상담 기록 수정</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<nav class="navbar">
    <a th:href="@{/dashboard}" class="navbar-brand">⚖️ 손해사정 시스템</a>
</nav>
<div class="container">
    <h2>상담 기록 수정</h2>
    <form th:action="@{/cases/{id}/consultations/{cid}(id=${caseId}, cid=${consultation.id})}" method="post">
        <div class="form-group">
            <label>상담내용 *</label>
            <textarea name="content" rows="6" required minlength="10" th:text="${consultation.content}"></textarea>
        </div>
        <div class="form-group">
            <label>특이사항</label>
            <textarea name="specialNote" rows="3" th:text="${consultation.specialNote}"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">저장</button>
        <a th:href="@{/cases/{id}/consultations/{cid}(id=${caseId}, cid=${consultation.id})}" class="btn btn-secondary">취소</a>
    </form>
</div>
</body>
</html>
