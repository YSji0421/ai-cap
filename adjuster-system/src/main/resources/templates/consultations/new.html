<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>상담 기록 입력</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<nav class="navbar">
    <a th:href="@{/dashboard}" class="navbar-brand">⚖️ 손해사정 시스템</a>
    <a th:href="@{/cases}">사건 목록</a>
</nav>
<div class="container">
    <h2>상담 기록 입력</h2>
    <form th:action="@{/cases/{id}/consultations(id=${caseId})}" method="post">
        <div class="form-group">
            <label>상담일시 *</label>
            <input type="datetime-local" name="consultDatetime" required>
        </div>
        <div class="form-group">
            <label>상담방법 *</label>
            <select name="consultMethod" required>
                <option value="PHONE">전화</option>
                <option value="IN_PERSON">대면</option>
                <option value="EMAIL">이메일</option>
                <option value="OTHER">기타</option>
            </select>
        </div>
        <div class="form-group">
            <label>상담내용 * (최소 10자)</label>
            <textarea name="content" rows="6" required minlength="10" placeholder="상담 내용을 입력하세요..."></textarea>
        </div>
        <div class="form-group">
            <label>특이사항</label>
            <textarea name="specialNote" rows="3"></textarea>
        </div>
        <button type="submit" name="autoSummary" value="true" class="btn btn-primary">저장 및 AI 요약</button>
        <button type="submit" class="btn btn-secondary">저장만</button>
        <a th:href="@{/cases/{id}(id=${caseId})}" class="btn btn-secondary">취소</a>
    </form>
</div>
</body>
</html>
