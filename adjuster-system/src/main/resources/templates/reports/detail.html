<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>보고서</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<nav class="navbar">
    <a th:href="@{/dashboard}" class="navbar-brand">⚖️ 손해사정 시스템</a>
</nav>
<div class="container">
    <h2 th:text="${report.title}"></h2>
    <div class="card">
        <pre th:text="${report.reportContent}" style="white-space:pre-wrap; font-family:inherit;"></pre>
    </div>
    <form th:action="@{/cases/{id}/reports/{rid}(id=${caseId}, rid=${report.id})}" method="post">
        <div class="form-group">
            <label>사정 의견</label>
            <textarea name="adjusterOpinion" rows="4" th:text="${report.adjusterOpinion}" placeholder="사정 의견을 입력하세요..."></textarea>
        </div>
        <div class="form-group">
            <label>결론</label>
            <textarea name="conclusion" rows="4" th:text="${report.conclusion}" placeholder="결론을 입력하세요..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary">저장</button>
        <a th:href="@{/cases/{id}/reports/{rid}/finalize(id=${caseId}, rid=${report.id})}"
           th:if="${report.status.name() == 'DRAFT'}"
           onclick="return confirm('최종 완료 처리하시겠습니까?')"
           class="btn btn-success">최종 완료</button>
        <a th:href="@{/cases/{id}(id=${caseId})}" class="btn btn-secondary">목록으로</a>
    </form>
</div>
</body>
</html>
