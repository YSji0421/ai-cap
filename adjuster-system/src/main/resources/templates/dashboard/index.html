<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>대시보드 - 손해사정 시스템</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand"><a th:href="@{/dashboard}">⚖️ 손해사정 시스템</a></div>
    <div class="nav-links">
        <a th:href="@{/dashboard}" class="active">대시보드</a>
        <a th:href="@{/cases}">사건 목록</a>
        <a th:href="@{/cases/new}">+ 새 사건</a>
    </div>
    <div class="nav-user">
        <span sec:authentication="name"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-logout">로그아웃</button>
        </form>
    </div>
</nav>

<div class="container">
    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-error" th:text="${errorMsg}"></div>

    <div class="page-header">
        <h2>대시보드</h2>
        <a th:href="@{/cases/new}" class="btn btn-primary">+ 새 사건 등록</a>
    </div>

    <!-- 통계 카드 -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-number" th:text="${dashboard.totalCases}">0</div>
            <div class="stat-label">전체 사건</div>
        </div>
        <div class="stat-card received">
            <div class="stat-number" th:text="${dashboard.receivedCount}">0</div>
            <div class="stat-label">접수</div>
        </div>
        <div class="stat-card in-progress">
            <div class="stat-number" th:text="${dashboard.inProgressCount}">0</div>
            <div class="stat-label">진행중</div>
        </div>
        <div class="stat-card completed">
            <div class="stat-number" th:text="${dashboard.completedCount}">0</div>
            <div class="stat-label">완료</div>
        </div>
        <div class="stat-card on-hold">
            <div class="stat-number" th:text="${dashboard.onHoldCount}">0</div>
            <div class="stat-label">보류</div>
        </div>
    </div>

    <div class="dashboard-grid">
        <!-- 최근 사건 -->
        <div class="card">
            <div class="card-header">
                <h3>최근 사건</h3>
                <a th:href="@{/cases}">전체보기 →</a>
            </div>
            <div th:if="${dashboard.recentCases.empty}" class="empty-msg">
                등록된 사건이 없습니다. <a th:href="@{/cases/new}">새 사건 등록</a>
            </div>
            <table th:unless="${dashboard.recentCases.empty}" class="table">
                <thead>
                    <tr>
                        <th>사건명</th>
                        <th>고객명</th>
                        <th>상태</th>
                        <th>접수일</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${dashboard.recentCases}"
                        th:onclick="|location.href='/cases/${c.id}'|" class="clickable-row">
                        <td th:text="${c.caseName}"></td>
                        <td th:text="${c.clientName}"></td>
                        <td>
                            <span class="badge" th:classappend="'status-' + ${c.status.name().toLowerCase()}"
                                  th:text="${c.statusDisplay}"></span>
                        </td>
                        <td th:text="${c.receivedDate}"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 최근 상담 -->
        <div class="card">
            <div class="card-header">
                <h3>최근 상담 기록</h3>
            </div>
            <div th:if="${dashboard.recentConsultations.empty}" class="empty-msg">
                상담 기록이 없습니다.
            </div>
            <div th:unless="${dashboard.recentConsultations.empty}">
                <div th:each="c : ${dashboard.recentConsultations}" class="consult-item"
                     th:onclick="|location.href='/cases/${c.caseId}/consultations/${c.consultationId}'|">
                    <div class="consult-case" th:text="${c.caseName}"></div>
                    <div class="consult-meta">
                        <span th:text="${c.consultDatetime}"></span>
                        <span class="badge-method" th:text="${c.consultMethod}"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/ai-functions.js}"></script>
</body>
</html>
