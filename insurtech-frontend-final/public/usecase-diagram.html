<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AI 보험 상담 플랫폼 - 유즈케이스 다이어그램</title>
<style>
  body { margin: 0; background: #fff; font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<svg viewBox="0 0 1200 920" width="1200" height="920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#555" stroke-width="1"/>
    </marker>
    <marker id="arrow-ext" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#2563eb" stroke-width="1"/>
    </marker>
    <marker id="arrow-inc" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#059669" stroke-width="1"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" font-size="22" font-weight="800" fill="#1e293b">AI 보험 화상 상담 플랫폼 — 유즈케이스 다이어그램</text>

  <!-- System Boundary -->
  <rect x="250" y="58" width="720" height="840" rx="18" fill="#f8fafc" stroke="#1e3a8a" stroke-width="2.5" stroke-dasharray="10,5"/>
  <text x="610" y="88" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">AI 보험 화상 상담 시스템</text>

  <!-- ========== ACTORS (Left) ========== -->
  <!-- 손해사정사 -->
  <g transform="translate(80,180)">
    <circle cx="0" cy="-18" r="14" fill="none" stroke="#7c3aed" stroke-width="2.5"/>
    <line x1="0" y1="-4" x2="0" y2="28" stroke="#7c3aed" stroke-width="2.5"/>
    <line x1="-18" y1="8" x2="18" y2="8" stroke="#7c3aed" stroke-width="2.5"/>
    <line x1="0" y1="28" x2="-14" y2="48" stroke="#7c3aed" stroke-width="2.5"/>
    <line x1="0" y1="28" x2="14" y2="48" stroke="#7c3aed" stroke-width="2.5"/>
    <text x="0" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">손해사정사</text>
  </g>

  <!-- 보험설계사 -->
  <g transform="translate(80,400)">
    <circle cx="0" cy="-18" r="14" fill="none" stroke="#2563eb" stroke-width="2.5"/>
    <line x1="0" y1="-4" x2="0" y2="28" stroke="#2563eb" stroke-width="2.5"/>
    <line x1="-18" y1="8" x2="18" y2="8" stroke="#2563eb" stroke-width="2.5"/>
    <line x1="0" y1="28" x2="-14" y2="48" stroke="#2563eb" stroke-width="2.5"/>
    <line x1="0" y1="28" x2="14" y2="48" stroke="#2563eb" stroke-width="2.5"/>
    <text x="0" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">보험설계사</text>
  </g>

  <!-- 보험사 CS -->
  <g transform="translate(80,620)">
    <circle cx="0" cy="-18" r="14" fill="none" stroke="#059669" stroke-width="2.5"/>
    <line x1="0" y1="-4" x2="0" y2="28" stroke="#059669" stroke-width="2.5"/>
    <line x1="-18" y1="8" x2="18" y2="8" stroke="#059669" stroke-width="2.5"/>
    <line x1="0" y1="28" x2="-14" y2="48" stroke="#059669" stroke-width="2.5"/>
    <line x1="0" y1="28" x2="14" y2="48" stroke="#059669" stroke-width="2.5"/>
    <text x="0" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">보험사 CS</text>
  </g>

  <!-- ========== ACTOR (Right) — Gemini AI ========== -->
  <g transform="translate(1120,420)">
    <rect x="-32" y="-38" width="64" height="52" rx="8" fill="#f0f9ff" stroke="#0369a1" stroke-width="2"/>
    <text x="0" y="-12" text-anchor="middle" font-size="22">🤖</text>
    <text x="0" y="34" text-anchor="middle" font-size="13" font-weight="700" fill="#0369a1">Gemini AI</text>
  </g>

  <!-- ========== ACTOR (Right) — 상대방 ========== -->
  <g transform="translate(1120,640)">
    <circle cx="0" cy="-18" r="14" fill="none" stroke="#d97706" stroke-width="2.5"/>
    <line x1="0" y1="-4" x2="0" y2="28" stroke="#d97706" stroke-width="2.5"/>
    <line x1="-18" y1="8" x2="18" y2="8" stroke="#d97706" stroke-width="2.5"/>
    <line x1="0" y1="28" x2="-14" y2="48" stroke="#d97706" stroke-width="2.5"/>
    <line x1="0" y1="28" x2="14" y2="48" stroke="#d97706" stroke-width="2.5"/>
    <text x="0" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#d97706">상대방(고객)</text>
  </g>

  <!-- ========== USE CASES ========== -->
  <!-- UC1: 회원가입 -->
  <ellipse cx="440" cy="140" rx="110" ry="30" fill="#fff" stroke="#374151" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="440" y="145" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">회원가입</text>

  <!-- UC2: 로그인 (역할 선택) -->
  <ellipse cx="440" cy="220" rx="110" ry="30" fill="#fff" stroke="#374151" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="440" y="216" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">로그인</text>
  <text x="440" y="232" text-anchor="middle" font-size="11" fill="#6b7280">(역할 선택 포함)</text>

  <!-- UC3: 장치 체크 -->
  <ellipse cx="440" cy="310" rx="110" ry="30" fill="#fff" stroke="#374151" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="440" y="315" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">장치 체크</text>

  <!-- UC4: 보험 유형 선택 -->
  <ellipse cx="700" cy="310" rx="110" ry="30" fill="#fff" stroke="#374151" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="700" y="315" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">보험 유형 선택</text>

  <!-- UC5: 화상 상담 진행 -->
  <ellipse cx="540" cy="430" rx="120" ry="34" fill="#eff6ff" stroke="#1e3a8a" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="540" y="435" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">화상 상담 진행</text>

  <!-- UC6: 음성 인식(STT) -->
  <ellipse cx="370" cy="530" rx="100" ry="28" fill="#fff" stroke="#374151" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="370" y="535" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">음성 인식 (STT)</text>

  <!-- UC7: AI 분석 요청 -->
  <ellipse cx="700" cy="470" rx="110" ry="30" fill="#f0f9ff" stroke="#0369a1" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="700" y="466" text-anchor="middle" font-size="13" font-weight="600" fill="#0369a1">AI 분석 요청</text>
  <text x="700" y="482" text-anchor="middle" font-size="11" fill="#6b7280">(유형별 특화 분석)</text>

  <!-- UC8: WebRTC P2P 연결 -->
  <ellipse cx="730" cy="390" rx="110" ry="28" fill="#fff" stroke="#374151" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="730" y="395" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">WebRTC P2P 연결</text>

  <!-- UC9: 약관 문서 조회 -->
  <ellipse cx="370" cy="610" rx="100" ry="28" fill="#fff" stroke="#374151" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="370" y="615" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">약관 문서 조회</text>

  <!-- UC10: 상담 종료 및 요약 -->
  <ellipse cx="540" cy="700" rx="120" ry="30" fill="#fff" stroke="#374151" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="540" y="705" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">상담 종료 및 요약</text>

  <!-- UC11: 보고서 다운로드 -->
  <ellipse cx="700" cy="780" rx="110" ry="30" fill="#fff" stroke="#374151" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="700" y="776" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">보고서 다운로드</text>
  <text x="700" y="792" text-anchor="middle" font-size="11" fill="#6b7280">(PDF 인쇄)</text>

  <!-- UC12: 대시보드 조회 -->
  <ellipse cx="440" cy="850" rx="110" ry="30" fill="#fff" stroke="#374151" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="440" y="846" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">대시보드 조회</text>
  <text x="440" y="862" text-anchor="middle" font-size="11" fill="#6b7280">(역할별 대시보드)</text>

  <!-- ========== ASSOCIATION LINES (Actors → Use Cases) ========== -->
  <!-- 손해사정사 lines -->
  <line x1="110" y1="170" x2="330" y2="145" stroke="#7c3aed" stroke-width="1.5"/>
  <line x1="110" y1="180" x2="330" y2="220" stroke="#7c3aed" stroke-width="1.5"/>
  <line x1="110" y1="195" x2="420" y2="400" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="3,3"/>

  <!-- 보험설계사 lines -->
  <line x1="110" y1="390" x2="330" y2="145" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="110" y1="400" x2="330" y2="220" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="120" y1="410" x2="420" y2="430" stroke="#2563eb" stroke-width="1.2" stroke-dasharray="3,3"/>

  <!-- 보험사 CS lines -->
  <line x1="110" y1="610" x2="330" y2="145" stroke="#059669" stroke-width="1.5"/>
  <line x1="110" y1="620" x2="330" y2="220" stroke="#059669" stroke-width="1.5"/>
  <line x1="120" y1="625" x2="420" y2="430" stroke="#059669" stroke-width="1.2" stroke-dasharray="3,3"/>

  <!-- All 3 actors → 장치체크, 상담종료, 대시보드 (use mid-actor at planner) -->
  <line x1="110" y1="400" x2="330" y2="310" stroke="#555" stroke-width="1.3"/>
  <line x1="120" y1="420" x2="420" y2="700" stroke="#555" stroke-width="1.3"/>
  <line x1="110" y1="430" x2="330" y2="850" stroke="#555" stroke-width="1.3"/>

  <!-- Gemini AI → AI 분석 -->
  <line x1="1088" y1="420" x2="810" y2="470" stroke="#0369a1" stroke-width="1.8"/>

  <!-- 상대방 → WebRTC P2P -->
  <line x1="1088" y1="630" x2="840" y2="395" stroke="#d97706" stroke-width="1.5"/>

  <!-- ========== INCLUDE / EXTEND RELATIONSHIPS ========== -->

  <!-- 화상 상담 --include--> 음성인식 -->
  <line x1="460" y1="455" x2="400" y2="505" stroke="#059669" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-inc)"/>
  <text x="405" y="478" text-anchor="middle" font-size="10" fill="#059669" font-style="italic">&lt;&lt;include&gt;&gt;</text>

  <!-- 화상 상담 --include--> WebRTC P2P -->
  <line x1="620" y1="405" x2="660" y2="398" stroke="#059669" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-inc)"/>
  <text x="660" y="418" text-anchor="middle" font-size="10" fill="#059669" font-style="italic">&lt;&lt;include&gt;&gt;</text>

  <!-- 화상 상담 --extend--> AI 분석 -->
  <line x1="620" y1="455" x2="640" y2="462" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-ext)"/>
  <text x="655" y="445" text-anchor="middle" font-size="10" fill="#2563eb" font-style="italic">&lt;&lt;extend&gt;&gt;</text>

  <!-- 화상 상담 --include--> 약관 문서 조회 -->
  <line x1="465" y1="458" x2="400" y2="585" stroke="#059669" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-inc)"/>
  <text x="400" y="570" text-anchor="middle" font-size="10" fill="#059669" font-style="italic">&lt;&lt;include&gt;&gt;</text>

  <!-- 장치체크 --include--> 보험 유형 선택 -->
  <line x1="550" y1="310" x2="590" y2="310" stroke="#059669" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-inc)"/>
  <text x="575" y="302" text-anchor="middle" font-size="10" fill="#059669" font-style="italic">&lt;&lt;include&gt;&gt;</text>

  <!-- 상담 종료 --extend--> 보고서 다운로드 -->
  <line x1="620" y1="720" x2="650" y2="756" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-ext)"/>
  <text x="670" y="740" text-anchor="middle" font-size="10" fill="#2563eb" font-style="italic">&lt;&lt;extend&gt;&gt;</text>

  <!-- 화상 상담 → 상담 종료 -->
  <line x1="540" y1="464" x2="540" y2="670" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- ========== LEGEND ========== -->
  <rect x="265" y="100" width="180" height="115" rx="8" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="275" y="118" font-size="11" font-weight="700" fill="#374151">범례</text>
  <line x1="275" y1="136" x2="315" y2="136" stroke="#555" stroke-width="1.5"/>
  <text x="320" y="140" font-size="10" fill="#555">연관 (Association)</text>
  <line x1="275" y1="156" x2="315" y2="156" stroke="#059669" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="320" y="160" font-size="10" fill="#059669">&lt;&lt;include&gt;&gt;</text>
  <line x1="275" y1="176" x2="315" y2="176" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="320" y="180" font-size="10" fill="#2563eb">&lt;&lt;extend&gt;&gt;</text>
  <ellipse cx="290" cy="200" rx="16" ry="10" fill="#eff6ff" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="320" y="204" font-size="10" fill="#374151">핵심 유즈케이스</text>
</svg>
</body>
</html>
